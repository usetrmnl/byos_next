---
openapi: 3.0.1
info:
  title: TRMNL API
  version: '1'
paths:
  "/api/display":
    get:
      summary: Fetch the next screen
      tags:
      - Device API
      parameters:
      - name: Access-Token
        in: header
        required: true
        description: Device API Key (eg. abc-123)
        schema:
          type: string
      - name: Battery-Voltage
        in: header
        required: false
        description: Device battery voltage (eg. 3.7)
        schema:
          type: number
      - name: Percent-Charged
        in: header
        required: false
        description: Device percent charged (eg. 69.4)
        schema:
          type: number
      - name: Battery-Count
        in: header
        required: false
        description: Number of batteries in device (e.g. 1-2)
        schema:
          type: number
      - name: Battery-Charging
        in: header
        required: false
        description: Whether device is plugged into power (eg. true)
        schema:
          type: number
      - name: Battery-Health
        in: header
        required: false
        description: Quality of battery (eg. -1-100)
        schema:
          type: number
      - name: Battery-Current
        in: header
        required: false
        description: Battery current (eg. -1-N)
        schema:
          type: number
      - name: Battery-Temp
        in: header
        required: false
        description: Battery temperature in celsius (eg. -1-N)
        schema:
          type: number
      - name: Battery-Capacity
        in: header
        required: false
        description: Ratio of current / max capacity (eg. -1/-1 in fault case)
        schema:
          type: number
      - name: FW-Version
        in: header
        required: false
        description: Device firmware version (eg. 0.0.1)
        schema:
          type: string
      - name: RSSI
        in: header
        required: false
        description: Device RSSI (eg. -69)
        schema:
          type: number
      - name: Height
        in: header
        required: false
        description: Device screen height (eg. 480)
        schema:
          type: string
      - name: Width
        in: header
        required: false
        description: Device screen width (eg. 800)
        schema:
          type: string
      - name: Special-Function
        in: header
        required: false
        description: Device special function (eg. true)
        schema:
          type: boolean
      - name: BASE64
        in: header
        required: false
        description: Encode image function (eg. true)
        schema:
          type: boolean
      - name: Sensors
        in: header
        required: false
        description: Environmental sensor data
        schema:
          type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 200
                  image_url:
                    type: string
                    nullable: true
                    example: https://trmnl.com/images/system_screens/setup_logo/og_plus.png
                  filename:
                    type: string
                    nullable: true
                    example: setup-logo.bmp
                  refresh_rate:
                    type: integer
                    example: 300
                  reset_firmware:
                    type: boolean
                    example: false
                  update_firmware:
                    type: boolean
                    example: false
                  firmware_url:
                    type: string
                    nullable: true
                    example: https://trmnl.com/firmware/1.0.0.bin
                  special_function:
                    type: string
                    nullable: false
                    example: identify
                  action:
                    type: string
                    nullable: true
                    example: identify
  "/api/display/current":
    get:
      summary: Fetch the current screen
      tags:
      - Device API
      parameters:
      - name: Access-Token
        in: header
        required: true
        description: Device API Key (eg. abc-123)
        schema:
          type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 200
                  refresh_rate:
                    type: integer
                    example: 300
                  image_url:
                    type: string
                    nullable: true
                    example: https://trmnl.com/images/system_screens/setup_logo/og_plus.png
                  filename:
                    type: string
                    nullable: true
                    example: setup-logo.bmp
                  rendered_at:
                    type: string
                    nullable: true
                    example: '2023-01-01T00:00:00Z'
  "/api/log":
    post:
      summary: Log with logs[] (array)
      tags:
      - Device API
      parameters:
      - name: Access-Token
        in: header
        required: true
        description: Device API Key (eg. abc-123)
        schema:
          type: string
      responses:
        '204':
          description: Logs created when ignore_log_messages is not set
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                logs:
                  type: array
                  items: {}
              required:
              - logs
              additionalProperties: false
        required: true
        description: 'An array of log entries. Each entry can be any JSON type: string,
          object, etc.'
  "/api/setup":
    get:
      summary: Set up device
      tags:
      - Device API
      parameters:
      - name: ID
        in: header
        required: true
        description: Device MAC Address (eg. 41:B4:10:39:A1:24)
        schema:
          type: string
      - name: Model
        in: header
        required: true
        description: DEVICE_MODEL from firmware definitions
        schema:
          type: string
      description: |
        Please note that the returned `status` JSON value may NOT always equal the HTTP status code. Notably, if a device MAC address is not found,
        then the HTTP status code will be 200 but the `status` code in the response will be 404.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 200
                  api_key:
                    type: string
                    nullable: true
                    example: abc-123
                  friendly_id:
                    type: string
                    nullable: true
                    example: ABC-123
                  image_url:
                    type: string
                    nullable: true
                    example: https://trmnl.com/images/system_screens/setup_logo/og_plus.png
                  message:
                    type: string
                    example: Register at trmnl.com/start with Device ID 'ABC-123'
  "/api/categories":
    get:
      summary: List all plugin categories
      tags:
      - Categories
      description: Returns a list of approved plugin categories.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 200
                  data:
                    type: array
                    items:
                      type: string
                    example:
                    - life
                    - marketing
                    - ecommerce
  "/api/ips":
    get:
      summary: List all TRMNL server IP addresses
      tags:
      - Server IPs
      description: |
        Returns a list of public IP addresses for all TRMNL core servers.

        Plugin poll requests will only originate from these IPs.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      ipv4:
                        type: array
                        items:
                          type: string
                      ipv6:
                        type: array
                        items:
                          type: string
  "/api/markup":
    post:
      summary: Render Liquid template
      tags:
      - Markup
      parameters: []
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    oneOf:
                    - type: string
                    - type: array
                      items:
                        type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                markup:
                  oneOf:
                  - type: string
                    example: Hello, {{ name }}!
                  - type: array
                    items:
                      type: string
                    example:
                    - Hello, {{ name }}!
                    - Goodbye, {{ name }}!
                variables:
                  type: object
                  example:
                    name: World
              required:
              - markup
              - variables
              additionalProperties: false
        required: true
        description: The Liquid markup(s) to render and an optional set of variables
          to use in the rendering process.
  "/api/models":
    get:
      summary: List all device models
      tags:
      - Models
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      "$ref": "#/components/schemas/Model"
  "/api/palettes":
    get:
      summary: List all palettes
      tags:
      - Palettes
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      "$ref": "#/components/schemas/Palette"
  "/api/devices":
    get:
      summary: List my devices
      tags:
      - Devices
      security:
      - bearer_auth: []
      responses:
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      "$ref": "#/components/schemas/Device"
  "/api/devices/{id}":
    parameters:
    - name: id
      in: path
      description: Device ID
      required: true
      schema:
        type: integer
    get:
      summary: Get the data of a device
      tags:
      - Devices
      security:
      - bearer_auth: []
      responses:
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "#/components/schemas/Device"
        '404':
          description: Not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
    patch:
      summary: Update a device
      tags:
      - Devices
      parameters: []
      security:
      - bearer_auth: []
      responses:
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '200':
          description: Updated
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                sleep_mode_enabled:
                  type: boolean
                  example: true
                sleep_start_time:
                  type: integer
                  example: 1320
                sleep_end_time:
                  type: integer
                  example: 480
                percent_charged:
                  type: number
                  example: 69.0
  "/api/me":
    get:
      summary: Get my user data
      tags:
      - Users
      security:
      - bearer_auth: []
      responses:
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "#/components/schemas/User"
  "/api/playlists/items":
    get:
      summary: List my playlist items
      tags:
      - Playlists
      security:
      - bearer_auth: []
      responses:
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      "$ref": "#/components/schemas/PlaylistItem"
  "/api/playlists/items/{id}":
    patch:
      summary: Update a playlist item
      tags:
      - Playlists
      parameters:
      - name: id
        in: path
        description: ID of the playlist item
        required: true
        schema:
          type: integer
      security:
      - bearer_auth: []
      responses:
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '200':
          description: Updated
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                visible:
                  type: boolean
              required:
              - visible
  "/api/plugin_settings/{id}/archive":
    parameters:
    - name: id
      in: path
      description: Plugin setting numeric ID (requires auth) or UUID (capability URL — no auth)
      required: true
      schema:
        type: string
    get:
      summary: Download a plugin setting archive
      tags:
      - Plugin Settings
      description: |
        Numeric IDs require bearer auth. UUIDs act as capability URLs and may
        be called without authentication.
      security:
      - bearer_auth: []
      - {}
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "#/components/schemas/PluginSettingArchive"
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
    post:
      summary: Upload a plugin setting archive
      tags:
      - Plugin Settings
      security:
      - bearer_auth: []
      - {}
      parameters: []
      responses:
        '401':
          description: Unauthorized (numeric id without session)
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '422':
          description: Archive too large or invalid
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "#/components/schemas/PluginSettingArchive"
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                archive:
                  type: string
                  format: binary
              description: Provide the archive under `file` (preferred) or `archive`.
        required: true
        description: Plugin setting archive file
  "/api/plugin_settings/{id}/data":
    parameters:
    - name: id
      in: path
      description: Plugin setting numeric ID (requires auth) or UUID (capability URL — no auth)
      required: true
      schema:
        type: string
    get:
      summary: Get the data of a plugin setting
      description: |
        Numeric IDs require bearer auth. UUIDs act as capability URLs and may
        be called without authentication — knowing the UUID is sufficient.
      tags:
      - Plugin Settings
      security:
      - bearer_auth: []
      - {}
      responses:
        '401':
          description: Unauthorized (numeric id without session)
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    additionalProperties: true
        '404':
          description: Not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '503':
          description: Database unavailable
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
    post:
      summary: Update data for a plugin setting
      description: |
        Numeric IDs require bearer auth. UUIDs act as capability URLs and may
        be called without authentication — this is the TRMNL webhook contract.
      tags:
      - Plugin Settings
      security:
      - bearer_auth: []
      - {}
      parameters: []
      responses:
        '401':
          description: Unauthorized (numeric id without session)
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    additionalProperties: true
        '404':
          description: Not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '422':
          description: Data cannot be modified
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/PluginSettingDataParams"
        required: true
        description: The value of `merge_variables` must be a JSON object
  "/api/plugin_settings/{id}/image":
    parameters:
    - name: id
      in: path
      description: Plugin setting numeric ID (requires auth) or UUID (capability URL — no auth)
      required: true
      schema:
        type: string
    post:
      summary: Upload an image icon for a plugin setting
      description: |
        Multipart upload of a raster image (PNG/JPEG/WebP/GIF). The bytes are
        stored inline as a `data:` URL in `icon_url`. SVG is rejected because
        a script-bearing SVG inside a `data:` URL becomes XSS as soon as a
        client renders it outside a strictly inert path.
      tags:
      - Plugin Settings
      security:
      - bearer_auth: []
      - {}
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
                file:
                  type: string
                  format: binary
              description: Provide the bytes under `image` (preferred) or `file`.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      icon_url:
                        type: string
                        nullable: true
                      icon_content_type:
                        type: string
                        nullable: true
        '401':
          description: Unauthorized (numeric id without session)
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '404':
          description: Not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '422':
          description: Image too large or unrecognized format
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
  "/api/plugin_settings/{id}/markup/{size}":
    get:
      summary: Read markup for a size
      tags:
      - Plugin Settings - Markup
      security:
      - bearer_auth: []
      - {}
      parameters:
      - name: id
        in: path
        required: true
        description: Plugin setting numeric ID (requires auth) or UUID (capability URL)
        schema:
          type: string
      - name: size
        in: path
        required: true
        description: Markup size (markup_full, markup_quadrant, markup_half_horizontal, markup_half_vertical)
        schema:
          type: string
      responses:
        '401':
          description: Unauthorized (numeric id without session)
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '200':
          description: Returns markup content (text/plain)
        '422':
          description: Invalid size
        '404':
          description: Not found
    put:
      summary: Write markup for a size
      tags:
      - Plugin Settings - Markup
      security:
      - bearer_auth: []
      - {}
      parameters:
      - name: id
        in: path
        required: true
        description: Plugin setting numeric ID (requires auth) or UUID (capability URL)
        schema:
          type: string
      - name: size
        in: path
        required: true
        description: Markup size (markup_full, markup_quadrant, markup_half_horizontal, markup_half_vertical)
        schema:
          type: string
      responses:
        '401':
          description: Unauthorized (numeric id without session)
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '200':
          description: Markup written successfully
        '422':
          description: Invalid size or oversized content
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  type: string
              required:
              - content
        required: true
  "/api/plugin_settings/{id}/settings":
    patch:
      summary: Update plugin settings fields
      tags:
      - Plugin Settings - Settings
      security:
      - bearer_auth: []
      - {}
      parameters:
      - name: id
        in: path
        required: true
        description: Plugin setting numeric ID (requires auth) or UUID (capability URL)
        schema:
          type: string
      responses:
        '401':
          description: Unauthorized (numeric id without session)
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '200':
          description: Settings updated successfully
        '422':
          description: Non-string field values
        '404':
          description: Not found
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                fields:
                  type: object
                  additionalProperties:
                    type: string
                    nullable: true
              required:
              - fields
        required: true
  "/api/plugin_settings":
    get:
      summary: List my plugin settings
      tags:
      - Plugin Settings
      security:
      - bearer_auth: []
      parameters:
      - name: plugin_id
        in: query
        required: false
        description: ID of a plugin or "calendars" to filter calendar plugins
        schema:
          type: string
      responses:
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '200':
          description: Returns all calendar plugin settings except Google Calendar
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      "$ref": "#/components/schemas/PluginSetting"
    post:
      summary: Create a new plugin setting
      tags:
      - Plugin Settings
      security:
      - bearer_auth: []
      parameters: []
      responses:
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    "$ref": "#/components/schemas/PluginSetting"
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/PluginSettingParams"
        required: true
  "/api/plugin_settings/{id}/details":
    get:
      summary: Get plugin setting details
      tags:
      - Plugin Settings
      security:
      - bearer_auth: []
      - {}
      parameters:
      - name: id
        in: path
        required: true
        description: Plugin setting numeric ID (requires auth) or UUID (capability URL)
        schema:
          type: string
      responses:
        '401':
          description: Unauthorized (numeric id without session)
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '200':
          description: Returns plugin details with markup sizes
        '404':
          description: Not found
  "/api/plugin_settings/{id}":
    delete:
      summary: Delete a plugin setting
      tags:
      - Plugin Settings
      security:
      - bearer_auth: []
      - {}
      parameters:
      - name: id
        in: path
        required: true
        description: Plugin setting numeric ID (requires auth) or UUID (capability URL)
        schema:
          type: string
      responses:
        '401':
          description: Unauthorized (numeric id without session)
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '204':
          description: Deleted
        '404':
          description: Not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
servers:
- url: https://{defaultHost}
  variables:
    defaultHost:
      default: trmnl.com
components:
  securitySchemes:
    bearer_auth:
      type: http
      scheme: bearer
      bearerFormat: Account API key
  schemas:
    Error:
      type: object
      additionalProperties: false
      properties:
        error:
          type: string
          example: An error occurred
    Device:
      type: object
      additionalProperties: false
      properties:
        id:
          type: integer
          example: 123
        name:
          type: string
          example: My TRMNL
        friendly_id:
          type: string
          example: ABC-123
        mac_address:
          type: string
          example: 12:34:56:78:9A:BC
        battery_voltage:
          type: number
          nullable: true
          example: 3.7
        rssi:
          type: integer
          nullable: true
          example: -70
        sleep_mode_enabled:
          type: boolean
          nullable: false
          example: false
        sleep_start_time:
